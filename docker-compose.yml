services:
  pdf-translator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zzpdftranslator
    ports:
      - "8010:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
      TRANSLATION_TARGET_LANGUAGE: ${TRANSLATION_TARGET_LANGUAGE:-Vietnamese}
      OUTPUT_TOKEN_FACTOR: ${OUTPUT_TOKEN_FACTOR:-1.18}
      PORT: ${PORT:-8000}
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    restart: unless-stopped
